org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Disable Kotlin incremental compilation: the project lives on D:\ while the pub
# cache (plugin Kotlin sources) is on C:\, and the incremental cache's relative-path
# converter cannot relativize across different drive roots on Windows
# ("this and base files have different roots"). Non-incremental build avoids it.
kotlin.incremental=false
